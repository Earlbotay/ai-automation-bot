name: Gemini Final Bot

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '0 */5 * * *' # Every 5 hours
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/gemini_bot
          key: ${{ runner.os }}-gemini-history-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-gemini-history-

      - name: Install Dependencies
        run: |
          pip install python-telegram-bot httpx pexpect

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
        run: |
          # Run for 4.8 hours then terminate to allow next cron to take over
          timeout 17280s python bot.py || true

      - name: Save Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/gemini_bot
          key: ${{ runner.os }}-gemini-history-${{ github.run_id }}
